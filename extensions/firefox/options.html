<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Application Tracker Capture Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Application Tracker Capture</h1>
    <p>Store the tracker URL and a scoped capture token from Settings.</p>

    <form id="options-form">
      <label>
        Tracker URL
        <input id="tracker-url" name="trackerUrl" placeholder="http://127.0.0.1:8000" required>
      </label>
      <label>
        Capture token
        <input id="capture-token" name="captureToken" placeholder="ats_..." autocomplete="off" required>
      </label>
      <label>
        Capture mode
        <select id="capture-mode" name="captureMode">
          <option value="full">Full page and selected text</option>
          <option value="selection">Selected text only</option>
          <option value="structured">Structured page data only</option>
        </select>
      </label>
      <button type="submit">Save settings</button>
    </form>

    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
